services:
  - type: web
    name: kuripot
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /workbox-*.js
        name: Cache-Control
        value: no-cache

